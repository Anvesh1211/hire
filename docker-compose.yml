version: '3.8'

services:
  proofsar-ai:
    build: .
    ports:
      - "8000:8000"
      - "8501:8501"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://postgres:password@db:5432/proofsar_ai
      - JWT_SECRET_KEY=your-production-secret-key-change-this
      - EMAIL_USERNAME=${EMAIL_USERNAME}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./logs:/app/logs
      - ./exports:/app/exports
      - ./demo_data:/app/demo_data
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - proofsar-network

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=proofsar_ai
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - proofsar-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - proofsar-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - proofsar-ai
    restart: unless-stopped
    networks:
      - proofsar-network

volumes:
  postgres_data:
  redis_data:

networks:
  proofsar-network:
    driver: bridge
